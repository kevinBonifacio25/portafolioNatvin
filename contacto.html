<div class="contact-section">
    
    <!-- FORMULARIO -->
    <div class="form-container">
        <form class="contact-form">
            <h2>📩 Contáctanos</h2>
            <p>Déjanos tu mensaje y te responderemos pronto</p>

            <div class="input-group">
                <input type="text" required placeholder=" ">
                <label>Nombre completo</label>
            </div>

            <div class="input-group">
                <input type="email" required placeholder=" ">
                <label>Correo electrónico</label>
            </div>

            <div class="input-group">
                <input type="tel" placeholder=" ">
                <label>Teléfono</label>
            </div>

            <div class="input-group">
                <select required>
                    <option value="" disabled selected></option>
                    <option>Soporte</option>
                    <option>Ventas</option>
                    <option>Información</option>
                    <option>Arquiler de equipo</option>
                </select>
                <label>Motivo</label>
            </div>

            <div class="input-group">
                <textarea rows="4" required placeholder=" "></textarea>
                <label>Mensaje</label>
            </div>

            <button type="submit">Enviar mensaje 🚀</button>
        </form>
    </div>

    <!-- MAPA -->
    <div class="map-container">
        <h3>📍 Aquí nos puedes encontrar</h3>
        <p>Visítanos o agenda una cita, estaremos encantados de atenderte.</p>
