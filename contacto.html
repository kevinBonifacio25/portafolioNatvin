<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section id="mostrarContact" class="cuartaDivision">
        <h3>Contactanos</h3>
        <form action="#" method="post" class="formulario">

            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre">
            </div>

            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Ingrese su email">
            </div>

            <button type="submit" class="botonEnviar">Enviar mensaje</button>

            <div>
            <a href="#" class="boton-cerrar">Inicio</a> 
            </div>


        </form>
        
    </section>




    <section class="titulomapa">
        <h3 >Encuentranos aqui:</h3>
    </section>

    </section>


</body>
</html>
